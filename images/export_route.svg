<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="rm-title">
  <title id="rm-title">Syria Silicon export route map: from Al-Qaryatayn deposit to Syrian reconstruction and GCC markets</title>

  <defs>
    <linearGradient id="rm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9F4E8"/>
      <stop offset="100%" stop-color="#EDE3CC"/>
    </linearGradient>
    <linearGradient id="sea-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8C5DD"/>
      <stop offset="100%" stop-color="#7FA9C7"/>
    </linearGradient>
    <marker id="route-arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <polygon points="0 0, 14 7, 0 14" fill="#0B2545"/>
    </marker>
  </defs>

  <rect width="1400" height="700" fill="url(#rm-bg)"/>

  <path d="M 0 230 Q 100 200 200 280 Q 250 340 200 420 Q 150 500 80 540 L 0 600 Z" fill="url(#sea-grad)" opacity="0.65"/>
  <text x="80" y="380" font-family="Georgia, serif" font-size="14" font-style="italic" fill="#1A4A6B" opacity="0.6">Mediterranean</text>

  <text x="700" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="500" fill="#0B2545" letter-spacing="0.5">Logistics and export route</text>
  <text x="700" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A89569" letter-spacing="2" font-weight="500">AL-QARYATAYN · HASSIA · TARTUS · REGIONAL MARKETS</text>

  <!-- Deposit to plant -->
  <path d="M 920 380 L 720 380" stroke="#0B2545" stroke-width="3" fill="none" marker-end="url(#route-arrow)"/>
  <text x="820" y="365" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0B2545" font-weight="500">~100 km</text>
  <text x="820" y="402" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">truck or rail</text>

  <!-- Plant to port -->
  <path d="M 620 380 L 320 380" stroke="#0B2545" stroke-width="3" fill="none" marker-end="url(#route-arrow)"/>
  <text x="470" y="365" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0B2545" font-weight="500">~200 km</text>
  <text x="470" y="402" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">to Mediterranean</text>

  <!-- Plant to Syrian reconstruction -->
  <path d="M 670 410 Q 740 480 810 540" stroke="#0B2545" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#route-arrow)"/>

  <!-- Port to GCC -->
  <path d="M 260 400 Q 320 540 540 600" stroke="#0B2545" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#route-arrow)"/>

  <!-- Deposit marker -->
  <g transform="translate(920, 380)">
    <circle cx="0" cy="0" r="18" fill="#A89569" stroke="#0B2545" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#FFFFFF"/>
    <text x="0" y="-32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" letter-spacing="2" font-weight="700">SOURCE</text>
    <text x="0" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="500" fill="#0B2545">Al-Qaryatayn</text>
    <text x="0" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6B7280">Homs Governorate</text>
    <text x="0" y="80" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">Silica deposit</text>
  </g>

  <!-- Wash plant marker -->
  <g transform="translate(670, 380)">
    <rect x="-18" y="-18" width="36" height="36" fill="#A89569" stroke="#0B2545" stroke-width="3"/>
    <rect x="-7" y="-7" width="14" height="14" fill="#FFFFFF"/>
    <text x="0" y="-32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" letter-spacing="2" font-weight="700">PROCESS</text>
    <text x="0" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="500" fill="#0B2545">Hassia</text>
    <text x="0" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6B7280">Industrial zone</text>
    <text x="0" y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">Wash plant</text>
  </g>

  <!-- Port marker -->
  <g transform="translate(280, 380)">
    <polygon points="0,-18 16,12 -16,12" fill="#0B2545" stroke="#0B2545" stroke-width="2"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#0B2545" letter-spacing="2" font-weight="700">EXPORT</text>
    <text x="0" y="46" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="500" fill="#0B2545">Tartus</text>
    <text x="0" y="64" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#6B7280">Mediterranean port</text>
    <text x="0" y="82" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">GCC export</text>
  </g>

  <!-- Syrian reconstruction market box (primary) -->
  <g transform="translate(710, 530)">
    <rect x="0" y="0" width="240" height="100" rx="4" fill="#FFFFFF" stroke="#A89569" stroke-width="2"/>
    <text x="120" y="25" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" letter-spacing="2" font-weight="600">PRIMARY MARKET</text>
    <text x="120" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="500" fill="#0B2545">Syrian Reconstruction</text>
    <text x="120" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280">All building materials</text>
    <text x="120" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280" font-style="italic">glass · tiles · concrete · refractories</text>
  </g>

  <!-- GCC market box -->
  <g transform="translate(440, 600)">
    <rect x="0" y="0" width="200" height="80" rx="4" fill="#FFFFFF" stroke="#A89569" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" letter-spacing="2" font-weight="600">EXPORT MARKET</text>
    <text x="100" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="500" fill="#0B2545">GCC</text>
    <text x="100" y="70" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6B7280">KSA · UAE · Qatar · Kuwait</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1080, 130)">
    <rect width="280" height="190" rx="4" fill="#0B2545"/>
    <text x="20" y="32" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="2" font-weight="600">DISTANCES &amp; LOGISTICS</text>
    <line x1="20" y1="46" x2="260" y2="46" stroke="#A89569" stroke-opacity="0.3"/>

    <text x="20" y="76" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF">Mine to plant</text>
    <text x="260" y="76" text-anchor="end" font-family="Georgia, serif" font-size="14" font-weight="500" fill="#D4C4A0">~100 km</text>

    <text x="20" y="104" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF">Plant to port</text>
    <text x="260" y="104" text-anchor="end" font-family="Georgia, serif" font-size="14" font-weight="500" fill="#D4C4A0">~200 km</text>

    <line x1="20" y1="122" x2="260" y2="122" stroke="#A89569" stroke-opacity="0.3"/>

    <text x="20" y="148" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF">Inland (Syria)</text>
    <text x="260" y="148" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#D4C4A0">primary</text>

    <text x="20" y="172" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF">Port to GCC</text>
    <text x="260" y="172" text-anchor="end" font-family="Georgia, serif" font-size="13" fill="#D4C4A0">via Suez</text>
  </g>

</svg>
