<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="vc-title">
  <title id="vc-title">Syria Silicon value chain from deposit to end markets</title>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2545"/>
      <stop offset="100%" stop-color="#13315C"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A89569"/>
      <stop offset="100%" stop-color="#D4C4A0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <polygon points="0 0, 14 7, 0 14" fill="#A89569"/>
    </marker>
    <marker id="arrow-faded" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <polygon points="0 0, 14 7, 0 14" fill="#A89569" fill-opacity="0.55"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="700" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="500" fill="#FFFFFF" letter-spacing="0.5">
    From the deposit to global markets
  </text>
  <text x="700" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#A89569" letter-spacing="2" font-weight="500">
    SYRIA SILICON · VALUE CHAIN
  </text>

  <!-- Layer label: PHASE 1 -->
  <text x="80" y="180" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="2.5" font-weight="600">PHASE 1 · NOW</text>
  <line x1="80" y1="190" x2="700" y2="190" stroke="#A89569" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Stage 1: Deposit -->
  <g transform="translate(80, 210)">
    <rect width="170" height="130" rx="4" fill="#1A3A5F" stroke="#A89569" stroke-width="1"/>
    <text x="85" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">DEPOSIT</text>
    <text x="85" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="500" fill="#FFFFFF">Al-Qaryatayn</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#D4C4A0">Homs, Syria</text>
    <text x="85" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">~100 Mt indicated</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="260" y1="275" x2="295" y2="275" stroke="#A89569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Wash plant -->
  <g transform="translate(305, 210)">
    <rect width="170" height="130" rx="4" fill="#1A3A5F" stroke="#A89569" stroke-width="1"/>
    <text x="85" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">WASH PLANT</text>
    <text x="85" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="500" fill="#FFFFFF">Hassia</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#D4C4A0">Industrial zone</text>
    <text x="85" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">USD 25M Phase 1</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="485" y1="275" x2="520" y2="275" stroke="#A89569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: 3N+ Silica -->
  <g transform="translate(530, 210)">
    <rect width="170" height="130" rx="4" fill="#1A3A5F" stroke="#A89569" stroke-width="1"/>
    <text x="85" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">PRODUCT</text>
    <text x="85" y="68" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="500" fill="#FFFFFF">3N+ silica</text>
    <text x="85" y="92" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#D4C4A0">Washed &amp; graded</text>
    <text x="85" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Q3 2026 first output</text>
  </g>

  <!-- Branch to Phase 1 markets (down/right) -->
  <path d="M 700 275 L 770 275" stroke="#A89569" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Phase 1 Markets -->
  <g transform="translate(780, 210)">
    <rect width="200" height="130" rx="4" fill="#0B2545" stroke="#D4C4A0" stroke-width="1.5"/>
    <text x="100" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">PHASE 1 MARKETS</text>
    <text x="100" y="68" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="500">Glass · Foundry</text>
    <text x="100" y="88" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="500">Construction</text>
    <text x="100" y="115" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#D4C4A0">Syrian reconstruction · GCC</text>
  </g>

  <!-- =========== PHASE 2 LAYER =========== -->
  <text x="80" y="430" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="2.5" font-weight="600" opacity="0.7">PHASE 2 · CONDITIONS-GATED</text>
  <line x1="80" y1="440" x2="700" y2="440" stroke="#A89569" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Connector from Phase 1 product down to Phase 2 -->
  <path d="M 615 340 L 615 380 L 615 460" stroke="#A89569" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="6,4" marker-end="url(#arrow-faded)" fill="none"/>
  <text x="635" y="395" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" opacity="0.7" font-style="italic">Same resource,</text>
  <text x="635" y="408" font-family="Inter, Arial, sans-serif" font-size="10" fill="#A89569" opacity="0.7" font-style="italic">further processing</text>

  <!-- Phase 2: advanced processing -->
  <g transform="translate(530, 460) " opacity="0.85">
    <rect width="170" height="110" rx="4" fill="#1A3A5F" stroke="#A89569" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="85" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">ADVANCED PROCESSING</text>
    <text x="85" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="500" fill="#FFFFFF">99.5%+ purity</text>
    <text x="85" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#D4C4A0">Acid leach + magnetic</text>
    <text x="85" y="98" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">USD 75M Phase 2</text>
  </g>

  <!-- Arrow to Phase 2 markets -->
  <line x1="710" y1="515" x2="770" y2="515" stroke="#A89569" stroke-width="2" stroke-opacity="0.7" marker-end="url(#arrow-faded)" opacity="0.9"/>

  <!-- Phase 2 markets -->
  <g transform="translate(780, 460)" opacity="0.9">
    <rect width="200" height="110" rx="4" fill="#0B2545" stroke="#D4C4A0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5" font-weight="600">PHASE 2 MARKETS</text>
    <text x="100" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="500">Microsilica · Refractories</text>
    <text x="100" y="78" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#FFFFFF" font-weight="500">Solar-grade pathway</text>
    <text x="100" y="100" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#D4C4A0">Global high-value</text>
  </g>

  <!-- Right side: Investment block -->
  <g transform="translate(1020, 210)">
    <rect width="320" height="360" rx="6" fill="#1A3A5F" stroke="#A89569" stroke-width="2"/>
    <text x="160" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="2" font-weight="600">CAPITAL STRUCTURE</text>
    <line x1="40" y1="55" x2="280" y2="55" stroke="#A89569" stroke-opacity="0.3"/>

    <!-- Phase 1 line -->
    <text x="40" y="95" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5">PHASE 1 · NOW</text>
    <text x="40" y="130" font-family="Georgia, serif" font-size="32" font-weight="500" fill="#FFFFFF">USD 25M</text>
    <text x="40" y="153" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Wash plant + working capital</text>

    <line x1="40" y1="175" x2="280" y2="175" stroke="#A89569" stroke-opacity="0.3"/>

    <!-- Phase 2 line -->
    <text x="40" y="205" font-family="Inter, Arial, sans-serif" font-size="11" fill="#A89569" letter-spacing="1.5">PHASE 2 · CONDITIONS-GATED</text>
    <text x="40" y="240" font-family="Georgia, serif" font-size="32" font-weight="500" fill="#FFFFFF">USD 75M</text>
    <text x="40" y="263" font-family="Inter, Arial, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.7">Advanced processing build-out</text>

    <line x1="40" y1="285" x2="280" y2="285" stroke="#A89569" stroke-opacity="0.5"/>

    <!-- Total line -->
    <text x="40" y="315" font-family="Inter, Arial, sans-serif" font-size="11" fill="#D4C4A0" letter-spacing="1.5" font-weight="600">FULL PROJECT</text>
    <text x="40" y="345" font-family="Georgia, serif" font-size="32" font-weight="600" fill="#D4C4A0">USD 100M</text>
  </g>

</svg>
